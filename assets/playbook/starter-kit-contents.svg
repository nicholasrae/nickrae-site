<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw Starter Kit ZIP contents</title>
  <desc id="desc">Preview of the editable Starter Kit files included with the OpenClaw Playbook.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11131a"/>
      <stop offset="1" stop-color="#050607"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="900" height="600" rx="32" fill="url(#bg)"/>
  <circle cx="810" cy="80" r="150" fill="#5e6ad2" opacity="0.18"/>
  <circle cx="80" cy="540" r="190" fill="#10b981" opacity="0.10"/>
  <g filter="url(#shadow)">
    <rect x="54" y="54" width="792" height="492" rx="22" fill="#0d0f12" stroke="rgba(255,255,255,0.12)"/>
    <rect x="54" y="54" width="792" height="54" rx="22" fill="#151821"/>
    <circle cx="83" cy="82" r="7" fill="#ff5f57"/>
    <circle cx="106" cy="82" r="7" fill="#ffbd2e"/>
    <circle cx="129" cy="82" r="7" fill="#28c840"/>
    <text x="168" y="88" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="16" fill="#cbd5e1">OpenClaw-Playbook-Starter-Kit.zip</text>
    <text x="78" y="146" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#f8fafc">Starter Kit ZIP contents</text>
    <text x="78" y="176" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#94a3b8">20 editable files plus 2 folders, verified from the launch ZIP.</text>
    <g font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="17" fill="#dbeafe">
      <text x="86" y="226">📄 security-audit-checklist.md</text>
      <text x="86" y="262">📄 cron-naming-cheatsheet.md</text>
      <text x="86" y="298">📁 templates/</text>
      <text x="120" y="332" fill="#a7f3d0">IDENTITY.md · SOUL.md · USER.md</text>
      <text x="120" y="366" fill="#a7f3d0">AGENTS.md · HEARTBEAT.md · LEARNINGS.md</text>
      <text x="86" y="418">📁 cron-configs/</text>
      <text x="120" y="452" fill="#c4b5fd">morning brief · task digest · db backup</text>
      <text x="120" y="486" fill="#c4b5fd">weather alert · app monitor · weekly review</text>
      <text x="120" y="520" fill="#c4b5fd">news brief · health check · social post · revenue tracker</text>
    </g>
  </g>
</svg>
